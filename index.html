<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#080a0f; --bg2:#0d1018; --bg3:#12161f; --bg4:#181d28;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.12); --border3:rgba(200,168,75,0.25);
  --text:#e8eaf0; --muted:#5a6070; --muted2:#8a9090;
  --gold:#c8a84b; --gold2:#e2c97e; --gold3:#f5e6b8; --gold-bg:rgba(200,168,75,0.08);
  --titan:#e05c3a; --hunter:#5a9fd4; --warlock:#a670d4;
  --green:#4ade80; --red:#f87171;
}
body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; font-weight:300; min-height:100vh; overflow-x:hidden; }
body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse at 15% 20%,rgba(200,168,75,0.04) 0%,transparent 50%),radial-gradient(ellipse at 85% 80%,rgba(74,158,255,0.03) 0%,transparent 50%); pointer-events:none; z-index:0; }

.page-header { position:relative; z-index:1; text-align:center; padding:3.5rem 2rem 2.5rem; border-bottom:1px solid var(--border); background:linear-gradient(180deg,rgba(200,168,75,0.05) 0%,transparent 100%); }
.page-header::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:120px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
.eyebrow { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:600; letter-spacing:0.35em; text-transform:uppercase; color:var(--gold); margin-bottom:0.5rem; opacity:0.8; }
.guardian-name { font-family:'Cinzel',serif; font-size:clamp(1.1rem,2vw,1.35rem); font-weight:600; letter-spacing:0.35em; text-transform:uppercase; color:var(--gold); opacity:0.75; margin-bottom:0.5rem; }
.page-title { font-family:'Cinzel',serif; font-size:clamp(2rem,5vw,4rem); font-weight:900; letter-spacing:0.06em; text-transform:uppercase; background:linear-gradient(180deg,var(--gold3) 0%,var(--gold) 60%,#8a6a20 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1; margin-bottom:0.75rem; }
.page-sub { font-size:clamp(1rem,2.5vw,1.4rem); color:var(--muted2); letter-spacing:0.12em; text-transform:uppercase; font-family:'Barlow Condensed',sans-serif; font-weight:400; margin-top:0.25rem; }

.gallery { position:relative; z-index:1; display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:1.5rem; max-width:1400px; margin:2rem auto; padding:0 1.5rem 3rem; }

.card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; overflow:hidden; display:flex; flex-direction:column; transition:border-color 0.3s,box-shadow 0.3s; }
.card.is-complete { border-color:rgba(200,168,75,0.2); box-shadow:0 0 30px rgba(200,168,75,0.05); }
.card.is-complete:hover { border-color:rgba(200,168,75,0.4); box-shadow:0 0 40px rgba(200,168,75,0.1); }
.card:not(.is-complete):hover { border-color:rgba(255,255,255,0.12); }

.card-banner { position:relative; height:140px; background:var(--bg3); overflow:hidden; }
.banner-img { width:100%; height:100%; object-fit:cover; object-position:center; display:block; opacity:0.85; transition:opacity 0.3s; }
.card:hover .banner-img { opacity:1; }
.banner-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:repeating-linear-gradient(45deg,var(--bg3) 0px,var(--bg3) 10px,var(--bg4) 10px,var(--bg4) 20px); }
.banner-placeholder-text { font-family:'Barlow Condensed',sans-serif; font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); text-align:center; padding:8px; }

.emblem-strip { position:relative; width:100%; aspect-ratio:474/96; background:var(--bg3); border-bottom:1px solid var(--border); overflow:hidden; }
.emblem-wrap { width:100%; height:100%; }
.emblem-img { width:100%; height:100%; object-fit:cover; object-position:left center; display:block; }
.emblem-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:repeating-linear-gradient(90deg,var(--bg3) 0px,var(--bg3) 20px,var(--bg4) 20px,var(--bg4) 40px); font-size:10px; font-weight:600; color:var(--muted); font-family:'Barlow Condensed',sans-serif; letter-spacing:0.15em; text-transform:uppercase; }

.card-body { padding:1.25rem 1.25rem 1.25rem; flex:1; display:flex; flex-direction:column; }
.card-number { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.card-title { font-family:'Cinzel',serif; font-size:22px; font-weight:700; letter-spacing:0.04em; color:var(--text); margin-bottom:0.25rem; line-height:1.2; }
.card.is-complete .card-title { color:var(--gold2); }
.card-divider { height:1px; background:linear-gradient(90deg,var(--gold),transparent); margin:0.75rem 0; opacity:0.3; }
.card.is-complete .card-divider { opacity:0.6; }
.completion-badge { display:inline-flex; align-items:center; gap:5px; font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:600; letter-spacing:0.15em; text-transform:uppercase; color:var(--gold); background:var(--gold-bg); border:1px solid rgba(200,168,75,0.2); border-radius:3px; padding:4px 10px; margin-bottom:0.5rem; width:fit-content; }

.char-list { display:flex; flex-direction:column; gap:6px; margin-top:0; padding-top:0.75rem; }
/* Two content rows + two fixed note rows */
.char-row { display:grid; grid-template-columns:22px 70px 1fr auto auto; grid-template-rows:auto 18px 22px; align-items:center; gap:3px 8px; padding:8px 10px 10px; border-radius:5px; background:var(--bg3); border:1px solid var(--border); min-height:76px; position:relative; }
.char-row.first-ever { border-color:var(--gold); box-shadow:0 0 0 1px var(--gold), 0 0 12px rgba(200,168,75,0.4); }
.first-ever-star { position:absolute; left:-9px; top:50%; transform:translateY(-50%); font-size:13px; line-height:1; }
.char-row.has-run { border-color:rgba(255,255,255,0.08); }
.char-row.no-run { opacity:1; }
.char-icon { width:22px; height:22px; border-radius:3px; object-fit:cover; display:block; flex-shrink:0; }
.char-icon-placeholder { width:22px; height:22px; border-radius:3px; background:var(--bg4); border:1px solid var(--border2); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:9px; color:var(--muted); }
.char-name { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; }
.char-name.titan { color:var(--titan); }
.char-name.hunter { color:var(--hunter); }
.char-name.warlock { color:var(--warlock); }
.char-date { font-size:13px; color:var(--muted2); white-space:nowrap; }
.char-duration { font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:500; color:var(--gold); white-space:nowrap; letter-spacing:0.04em; }
.char-link { color:var(--muted); text-decoration:none; font-size:13px; font-family:'Barlow Condensed',sans-serif; transition:color 0.15s; line-height:1; }
.char-link:hover { color:var(--gold); }
.char-empty { font-size:11px; color:var(--muted); font-style:italic; grid-column:2/-1; letter-spacing:0.03em; display:none; }
/* Note line 1 — manual text */
.char-note { grid-column:1/-1; font-size:13px; color:var(--muted2); letter-spacing:0.02em; font-style:normal; padding-left:4px; height:18px; line-height:18px; overflow:hidden; }
.char-note.first-ever-note { color:var(--gold); font-style:italic; font-weight:500; }
/* Note line 2 — death stats from CSV */
.char-deaths { grid-column:1/-1; font-size:12px; color:#4a5060; letter-spacing:0.01em; padding-left:2px; height:22px; line-height:22px; overflow:hidden; font-family:'Barlow',sans-serif; font-weight:300; display:flex; align-items:center; gap:4px; white-space:nowrap; }
.char-deaths.has-data { color:#e05050; opacity:0.85; }
.char-row.no-run .char-deaths.has-data { opacity:1; color:#f87171; }
.death-icon { width:20px; height:20px; object-fit:cover; border-radius:2px; flex-shrink:0; opacity:0.85; }

.page-footer { position:relative; z-index:1; text-align:center; padding:2rem; border-top:1px solid var(--border); font-size:11px; color:var(--muted); font-family:'Barlow Condensed',sans-serif; letter-spacing:0.1em; }

</style>

function loadStaticData() {
  Object.assign(bannerImages, STATIC_BANNERS);
  Object.assign(emblemImages, STATIC_EMBLEMS);
  Object.assign(classIcons, STATIC_CLASS_ICONS);
  for (const [dungeonId, chars] of Object.entries(STATIC_RUN_DATA)) {
    if (!runData[dungeonId]) runData[dungeonId] = {};
    for (const [cls, run] of Object.entries(chars)) {
      if (!runData[dungeonId][cls]) runData[dungeonId][cls] = run;
    }
  }
  // Merge static death data
  Object.assign(deathData, STATIC_DEATH_DATA);
}


function renderGallery() {
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = '';

  DUNGEONS.forEach(dungeon => {
    const runs = runData[dungeon.id] || {};
    const deaths = deathData[dungeon.id] || null;
    const hasAnyRun = CLASSES.some(c => runs[c]);
    const allComplete = CLASSES.every(c => runs[c]);

    const card = document.createElement('div');
    card.className = 'card' + (hasAnyRun ? ' is-complete' : '');

    // Banner
    const banner = document.createElement('div');
    banner.className = 'card-banner';
    if (bannerImages[dungeon.id]) {
      const img = document.createElement('img');
      img.className = 'banner-img';
      img.src = bannerImages[dungeon.id];
      img.alt = dungeon.name;
      banner.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'banner-placeholder';
      ph.innerHTML = `<div class="banner-placeholder-text">${dungeon.name}</div>`;
      banner.appendChild(ph);
    }
    card.appendChild(banner);

    // Emblem strip
    const emblemStrip = document.createElement('div');
    emblemStrip.className = 'emblem-strip';
    const emblemWrap = document.createElement('div');
    emblemWrap.className = 'emblem-wrap';
    if (emblemImages[dungeon.id]) {
      const eImg = document.createElement('img');
      eImg.className = 'emblem-img';
      eImg.src = emblemImages[dungeon.id];
      eImg.alt = 'Solo Flawless Emblem';
      emblemWrap.appendChild(eImg);

      ePh.className = 'emblem-placeholder';
      ePh.textContent = 'Solo Flawless Emblem';
      emblemWrap.appendChild(ePh);
    }
    emblemStrip.appendChild(emblemWrap);
    card.appendChild(emblemStrip);

    // Card body
    const body = document.createElement('div');
    body.className = 'card-body';

    const num = document.createElement('div');
    num.className = 'card-number';
    num.textContent = `Dungeon ${dungeon.num}`;
    body.appendChild(num);

    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = dungeon.name;
    body.appendChild(title);

      badge.innerHTML = '⚔️ Conquered';
    } else {
      badge.style.cssText = 'color:#3a6a8a;background:rgba(74,158,255,0.08);border-color:rgba(74,158,255,0.2)';
      badge.innerHTML = dungeon.status || '—';
    }
    body.appendChild(badge);

    const divider = document.createElement('div');
    divider.className = 'card-divider';
    body.appendChild(divider);

    // Character rows
    const charList = document.createElement('div');
    charList.className = 'char-list';

    CLASSES.forEach(cls => {
      const run = runs[cls];
      const clsDeath = deaths ? deaths[cls] : null;
      const row = document.createElement('div');
      row.className = 'char-row ' + (run ? 'has-run' : 'no-run');

      // Class icon
      if (classIcons[cls]) {
        const iconImg = document.createElement('img');
        iconImg.className = 'char-icon';
        iconImg.src = classIcons[cls];
        iconImg.alt = cls;
        row.appendChild(iconImg);
      } else {
        const iconPh = document.createElement('div');
        iconPh.className = 'char-icon-placeholder';
        iconPh.textContent = cls[0];
        row.appendChild(iconPh);
      }

      const nameEl = document.createElement('div');
      nameEl.className = `char-name ${CLASS_KEY[cls]}`;
      nameEl.textContent = cls;
      row.appendChild(nameEl);

      if (run) {
        if (run.firstEver) {
          row.classList.add('first-ever');
          const star = document.createElement('span');
          star.className = 'first-ever-star';
          star.textContent = '⭐';
          row.appendChild(star);
        }

        const dateEl = document.createElement('div');
        dateEl.className = 'char-date';
        dateEl.textContent = fmtDateShort(run.date);
        row.appendChild(dateEl);

        const durEl = document.createElement('div');
        durEl.className = 'char-duration';
        durEl.textContent = run.duration;
        row.appendChild(durEl);

        if (run.reportLink) {
          const linkEl = document.createElement('a');
          linkEl.className = 'char-link';
          linkEl.href = run.reportLink;
          linkEl.target = '_blank';
          linkEl.title = 'View on Dungeon Report';
          linkEl.textContent = '↗';
          row.appendChild(linkEl);
        }
      } else {
        const empty = document.createElement('div');
        empty.className = 'char-empty';
        empty.textContent = hasAnyRun ? 'Not yet completed' : '—';
        row.appendChild(empty);
      }

      // Note line 1 — manual text (always rendered for consistent height)
      const noteEl = document.createElement('div');
      noteEl.className = 'char-note' + ((run && run.firstEver) ? ' first-ever-note' : '');
      const incompleteNote = (!run && INCOMPLETE_NOTES[dungeon.id]) ? (INCOMPLETE_NOTES[dungeon.id][cls]?.note || '') : '';
      noteEl.textContent = (run && run.note) ? run.note : incompleteNote;
      row.appendChild(noteEl);

      // Note line 2 — death stats hardcoded (always rendered for consistent height)
      const deathEl = document.createElement('div');
      if (clsDeath && clsDeath.runs > 0) {
        deathEl.className = 'char-deaths has-data';
        const skullImg = document.createElement('img');
        skullImg.className = 'death-icon';
        skullImg.src = SKULL_ICON;
        skullImg.alt = '';
        deathEl.appendChild(skullImg);
        const deathText = document.createElement('span');
        if (clsDeath.conquered) {
          deathText.textContent = `${clsDeath.deaths} deaths in ${clsDeath.runs} attempt${clsDeath.runs !== 1 ? 's' : ''} to Solo Flawless`;
        } else {
          deathText.textContent = `So far: ${clsDeath.deaths} deaths across ${clsDeath.runs} attempt${clsDeath.runs !== 1 ? 's' : ''}`;
        }
        deathEl.appendChild(deathText);
      } else {
        deathEl.className = 'char-deaths';
        deathEl.textContent = '';
      }
      row.appendChild(deathEl);

      charList.appendChild(row);
    });

    body.appendChild(charList);
    card.appendChild(body);
    gallery.appendChild(card);
  });
}

loadStaticData();
renderGallery();
</script>
</body>
</html>
