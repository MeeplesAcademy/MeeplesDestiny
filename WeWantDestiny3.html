<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#WeWantDestiny3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Barlow+Condensed:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
}
body {
  background: #080a0f;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 30% 50%, rgba(200,168,75,0.07) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 50%, rgba(74,158,255,0.04) 0%, transparent 55%);
  pointer-events: none;
}
.hashtag {
  font-family: 'Cinzel', serif;
  font-size: clamp(2.5rem, 7vw, 7rem);
  font-weight: 900;
  letter-spacing: 0.03em;
  text-align: center;
  background: linear-gradient(180deg, #f5e6b8 0%, #c8a84b 55%, #8a6a20 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
  padding: 0 2rem;
  max-width: 95vw;
  word-break: break-word;
  position: relative;
  z-index: 1;
  margin-bottom: 2.5rem;
}
.bungie-id {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(2rem, 6vw, 5rem);
  font-weight: 400;
  letter-spacing: 0.25em;
  text-align: center;
  color: #e8eaf0;
  position: relative;
  z-index: 1;
}
</style>
</head>
<body>
  <div class="hashtag">#WeWantDestiny3</div>
  <div class="bungie-id">Meeples#3871</div>
</body>
</html>
